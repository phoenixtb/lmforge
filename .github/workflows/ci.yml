name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format & lint (fast gate — fails early) ───────────────────────────────
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-lint-${{ hashFiles('Cargo.lock') }}

      - name: Install Linux deps
        run: sudo apt-get update -qq && sudo apt-get install -y pkg-config libssl-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      # PowerShell scripts with non-ASCII bytes must carry a UTF-8 BOM, else
      # Windows PowerShell 5.1 (ANSI default) mis-decodes them and the parser
      # dies (e.g. em dash -> "â€”"). Only flags files that actually contain
      # non-ASCII without a BOM; pure-ASCII .ps1 files are left alone.
      - name: PowerShell scripts UTF-8 BOM check
        run: |
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if LC_ALL=C grep -qP '[\x80-\xFF]' "$f"; then
              bom=$(head -c3 "$f" | od -An -tx1 | tr -d ' \n')
              if [ "$bom" != "efbbbf" ]; then
                echo "::error file=$f::non-ASCII without UTF-8 BOM; re-save as UTF-8 with BOM (breaks Windows PowerShell 5.1)"
                fail=1
              fi
            fi
          done < <(git ls-files '*.ps1')
          # Scripts published for `irm … | iex` must be pure ASCII without BOM.
          # iex treats a leading BOM as literal input ("ï»¿#") on Windows PS 5.1.
          for f in scripts/install-core.ps1 scripts/install-ui.ps1 \
                   scripts/uninstall-core.ps1 scripts/uninstall-ui.ps1; do
            bom=$(head -c3 "$f" | od -An -tx1 | tr -d ' \n')
            if [ "$bom" = "efbbbf" ]; then
              echo "::error file=$f::UTF-8 BOM breaks irm | iex; save as UTF-8 without BOM (ASCII only)"
              fail=1
            fi
            if LC_ALL=C grep -qP '[\x80-\xFF]' "$f"; then
              echo "::error file=$f::non-ASCII breaks irm | iex on Windows; use ASCII punctuation only"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All .ps1 files OK."

  # ── Core unit + integration tests (macOS + Linux + Windows) ───────────────
  test:
    name: Tests — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-24.04 is pinned explicitly so we know the exact base.
        # ubuntu-latest tracks GitHub's default (currently 24.04; will
        # become 26.04 when available — keep it so breakage is caught early).
        # Add ubuntu-26.04 to this list once GitHub Actions offers the image.
        os: [ubuntu-24.04, ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.os }}-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.os }}-test-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y pkg-config libssl-dev

      # Windows: rustls is the default TLS backend; no OpenSSL needed.
      # Python is pre-installed on the Windows runner (used by find_python in tests).

      - name: cargo test
        run: cargo test --all-targets --verbose
