name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format & lint (fast gate — fails early) ───────────────────────────────
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-lint-${{ hashFiles('Cargo.lock') }}

      - name: Install Linux deps
        run: sudo apt-get update -qq && sudo apt-get install -y pkg-config libssl-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Core unit + integration tests (macOS + Linux + Windows) ───────────────
  test:
    name: Tests — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-24.04 is pinned explicitly so we know the exact base.
        # ubuntu-latest tracks GitHub's default (currently 24.04; will
        # become 26.04 when available — keep it so breakage is caught early).
        # Add ubuntu-26.04 to this list once GitHub Actions offers the image.
        os: [ubuntu-24.04, ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.os }}-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.os }}-test-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y pkg-config libssl-dev

      # Windows: rustls is the default TLS backend; no OpenSSL needed.
      # Python is pre-installed on the Windows runner (used by find_python in tests).

      - name: cargo test
        run: cargo test --all-targets --verbose
