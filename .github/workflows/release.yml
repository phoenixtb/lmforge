name: Release

on:
  push:
    tags:
      - "v*.*.*"   # Triggers on: git tag v0.2.0 && git push --tags

env:
  CARGO_TERM_COLOR: always
  BINARY: lmforge

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build matrix — one job per target platform
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (M-series)
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false

          # macOS Intel (older Macs)
          - os: macos-13
            target: x86_64-apple-darwin
            cross: false

          # Linux AMD64 (most servers, workstations)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false

          # Linux ARM64 (Raspberry Pi 5, AWS Graviton, Jetson)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true   # requires cross-compilation

          # Windows AMD64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (ARM64 Linux only)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary (native)
        if: matrix.cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      # ── Package into a .tar.gz (works on all 3 OSes via bash shell) ──────────
      - name: Package binary
        shell: bash
        run: |
          # Windows builds produce lmforge.exe; Unix builds produce lmforge
          EXT=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then EXT=".exe"; fi
          BIN_PATH="target/${{ matrix.target }}/release/${BINARY}${EXT}"
          TARBALL="${BINARY}-${{ matrix.target }}.tar.gz"
          tar -czf "$TARBALL" -C "$(dirname $BIN_PATH)" "$(basename $BIN_PATH)"
          echo "TARBALL=$TARBALL" >> $GITHUB_ENV

      # ── Upload artifact so the release job can attach it ──────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY }}-${{ matrix.target }}
          path: ${{ env.TARBALL }}
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release and attach all binaries
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "LMForge ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # e.g. v0.2.0-beta is pre-release
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
