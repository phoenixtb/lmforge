name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REPO: phoenixtb/lmforge

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  #  Core binary — one job per platform/arch
  # ─────────────────────────────────────────────────────────────────────────────
  build-core:
    name: Core — ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14           # Apple Silicon runner
            target: aarch64-apple-darwin
            asset_name: lmforge-macos-arm64

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_name: lmforge-linux-x86_64

          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            asset_name: lmforge-linux-arm64
            cross: true

          - os: windows-2022
            target: x86_64-pc-windows-msvc
            asset_name: lmforge-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-core-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-core-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y pkg-config libssl-dev

      - name: Install cross (for Linux ARM64)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --bin lmforge --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --bin lmforge --target ${{ matrix.target }}

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/lmforge ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target/${{ matrix.target }}/release/lmforge.exe" "${{ matrix.asset_name }}"

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  #  Tauri UI — macOS DMG + Linux (deb/rpm native + AppImage fallback) + Windows NSIS
  # ─────────────────────────────────────────────────────────────────────────────
  build-ui:
    name: UI — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
            target: aarch64-apple-darwin

          - os: ubuntu-22.04
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu

          - os: windows-2022
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ui/src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-ui-${{ hashFiles('ui/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-ui-

      - name: Install Linux deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libgtk-3-dev \
            libappindicator3-dev librsvg2-dev \
            patchelf libxdo-dev
          # libwebkit2gtk-4.1-dev was dropped in Ubuntu 26.04 in favour of
          # libwebkitgtk-6.0-dev. Try the 4.1 package first (22.04 / 24.04);
          # fall back to the 6.0 package (26.04+). Tauri 2.x supports both.
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y libwebkitgtk-6.0-dev

      # WebView2 is pre-installed on windows-2022; nothing extra needed.

      - name: Install npm deps
        working-directory: ui
        run: npm ci

      - name: Build Tauri app
        # Must run from ui/ so tauri.conf.json and frontendDist paths resolve correctly.
        # With --target, Tauri places output in the repo-root target/<target>/release/bundle/
        working-directory: ui
        env:
          # linuxdeploy/appimagetool are AppImages needing libfuse2 to mount;
          # extract-and-run avoids host FUSE so the AppImage bundle step works
          # on FUSE-less runners. No-op on macOS/Windows.
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Rename macOS DMG
        if: runner.os == 'macOS'
        run: |
          src=$(find target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$src" "LMForge-UI-${{ matrix.platform }}.dmg"

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: LMForge-UI-${{ matrix.platform }}.dmg
          path: LMForge-UI-${{ matrix.platform }}.dmg
          if-no-files-found: error
          retention-days: 1

      - name: Rename Linux AppImage
        if: runner.os == 'Linux'
        run: |
          src=$(find target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$src" "LMForge-UI-${{ matrix.platform }}.AppImage"

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: LMForge-UI-${{ matrix.platform }}.AppImage
          path: LMForge-UI-${{ matrix.platform }}.AppImage
          if-no-files-found: error
          retention-days: 1

      - name: Rename Linux native packages (deb + rpm)
        if: runner.os == 'Linux'
        run: |
          deb=$(find target/${{ matrix.target }}/release/bundle/deb -name "*.deb" | head -1)
          rpm=$(find target/${{ matrix.target }}/release/bundle/rpm -name "*.rpm" | head -1)
          cp "$deb" "LMForge-UI-${{ matrix.platform }}.deb"
          cp "$rpm" "LMForge-UI-${{ matrix.platform }}.rpm"

      - name: Upload Linux deb
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: LMForge-UI-${{ matrix.platform }}.deb
          path: LMForge-UI-${{ matrix.platform }}.deb
          if-no-files-found: error
          retention-days: 1

      - name: Upload Linux rpm
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: LMForge-UI-${{ matrix.platform }}.rpm
          path: LMForge-UI-${{ matrix.platform }}.rpm
          if-no-files-found: error
          retention-days: 1

      - name: Rename Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = Get-ChildItem "target/${{ matrix.target }}/release/bundle/nsis/*.exe" | Select-Object -First 1
          Copy-Item $src.FullName "LMForge-UI-${{ matrix.platform }}.exe"

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: LMForge-UI-${{ matrix.platform }}.exe
          path: LMForge-UI-${{ matrix.platform }}.exe
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  #  E2E gate — run the full install lifecycle against the exact artifacts
  #  that will ship. The release is not created unless this passes on all
  #  three platforms.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-gate:
    name: E2E gate — ${{ matrix.os }}
    needs: build-core
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: lmforge-linux-x86_64
          - os: macos-14
            asset: lmforge-macos-arm64
          - os: windows-latest
            asset: lmforge-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Download core artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/

      - name: Make binary executable (unix)
        if: runner.os != 'Windows'
        run: chmod +x "dist/${{ matrix.asset }}"

      # See e2e.yml for why headless Linux runners need this.
      - name: Enable user systemd session (headless runner)
        if: runner.os == 'Linux'
        run: |
          sudo loginctl enable-linger "$USER"
          uid=$(id -u)
          echo "XDG_RUNTIME_DIR=/run/user/$uid" >> "$GITHUB_ENV"
          echo "DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$uid/bus" >> "$GITHUB_ENV"
          for i in $(seq 1 15); do
            [ -S "/run/user/$uid/bus" ] && break
            sleep 1
          done
          XDG_RUNTIME_DIR=/run/user/$uid systemctl --user is-system-running --wait || true

      - name: Run E2E (unix)
        if: runner.os != 'Windows'
        env:
          LMFORGE_LOCAL_BIN: dist/${{ matrix.asset }}
        run: bash scripts/util/e2e-core.sh

      - name: Run E2E (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          LMFORGE_LOCAL_BIN: dist\${{ matrix.asset }}
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\util\e2e-core.ps1

      - name: Upload daemon logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-gate-logs-${{ matrix.os }}
          path: |
            ~/.lmforge/logs/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  #  Create GitHub Release (DRAFT) with all artifacts + install scripts.
  #  Publishing is manual: verify the draft (smoke-test on a real machine if
  #  desired), then click "Publish release" in the GitHub UI.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Draft Release
    needs: [build-core, build-ui, e2e-gate]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lah artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "LMForge ${{ github.ref_name }}"
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Install

            ### Core (daemon + CLI)

            **macOS / Linux:**
            ```bash
            curl -fsSL https://github.com/${{ env.REPO }}/releases/latest/download/install-core.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://github.com/${{ env.REPO }}/releases/latest/download/install-core.ps1 | iex
            ```

            ### UI (desktop app) — install Core first

            **macOS / Linux:**
            ```bash
            curl -fsSL https://github.com/${{ env.REPO }}/releases/latest/download/install-ui.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://github.com/${{ env.REPO }}/releases/latest/download/install-ui.ps1 | iex
            ```

            ### Uninstall

            **macOS / Linux:**
            ```bash
            # Remove UI only (daemon keeps running)
            curl -fsSL https://github.com/${{ env.REPO }}/releases/latest/download/uninstall-ui.sh | bash

            # Remove Core (stops daemon; keeps models)
            curl -fsSL https://github.com/${{ env.REPO }}/releases/latest/download/uninstall-core.sh | bash

            # Remove everything including models
            curl -fsSL https://github.com/${{ env.REPO }}/releases/latest/download/uninstall-core.sh | bash -s -- --purge
            ```

            **Windows (PowerShell):**
            ```powershell
            # Remove UI only (daemon keeps running)
            irm https://github.com/${{ env.REPO }}/releases/latest/download/uninstall-ui.ps1 | iex

            # Remove Core (stops daemon; keeps models)
            irm https://github.com/${{ env.REPO }}/releases/latest/download/uninstall-core.ps1 | iex

            # Remove everything including models
            $env:LMFORGE_PURGE = "1"; irm https://github.com/${{ env.REPO }}/releases/latest/download/uninstall-core.ps1 | iex
            ```

            ### Install / uninstall scripts (also attached as release assets)

            | Script | Platform |
            |--------|----------|
            | `install-core.sh` | macOS / Linux |
            | `install-core.ps1` | Windows |
            | `install-ui.sh` | macOS / Linux |
            | `install-ui.ps1` | Windows |
            | `uninstall-core.sh` | macOS / Linux |
            | `uninstall-core.ps1` | Windows |
            | `uninstall-ui.sh` | macOS / Linux |
            | `uninstall-ui.ps1` | Windows |
          files: |
            artifacts/*
            scripts/install-core.sh
            scripts/install-core.ps1
            scripts/uninstall-core.sh
            scripts/uninstall-core.ps1
            scripts/install-ui.sh
            scripts/install-ui.ps1
            scripts/uninstall-ui.sh
            scripts/uninstall-ui.ps1
