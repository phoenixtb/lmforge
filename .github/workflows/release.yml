name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REPO: phoenixtb/lmforge
  # Opt into Node 24 for JS-based actions (actions/checkout, cache,
  # upload-artifact, download-artifact, setup-node). Node 20 is forced
  # off the runners on 2026-06-02. Safe to set today — newer runtime is
  # backward-compatible with the bundled action code.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  #  Core bundles — one job per (platform × gpu/cpu variant).
  #
  #  Each job:
  #    1. Builds the `lmforge` Rust binary for its target.
  #    2. Stages a matching `llama-server` from upstream llama.cpp into the
  #       same directory (via scripts/bundle-llamacpp.sh).
  #    3. Tarballs (Linux/macOS) or zips (Windows) the staged tree.
  #
  #  macOS does NOT bundle llama.cpp — Apple Silicon's default engine is omlx
  #  (MLX). The macOS bundle ships `lmforge` alone; `lmforge init` pulls MLX
  #  at first run via uv.
  #
  #  Linux ARM64 is intentionally out of scope for the bundled-5 release.
  #  Upstream ships ARM64 builds (Vulkan + CPU), so we can add it later if
  #  there's demand — kept as a future expansion path.
  # ─────────────────────────────────────────────────────────────────────────────
  build-core:
    name: Core — ${{ matrix.asset_basename }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — GPU (Vulkan: NVIDIA + AMD + Intel iGPU)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_basename: lmforge-linux-x64
            archive_format: tar.gz
            bundle_platform: linux-x64-gpu
            binary_ext: ""

          # Linux x86_64 — CPU only
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_basename: lmforge-linux-x64-cpu
            archive_format: tar.gz
            bundle_platform: linux-x64-cpu
            binary_ext: ""

          # Windows x86_64 — GPU (Vulkan: NVIDIA + AMD + Intel iGPU)
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            asset_basename: lmforge-windows-x64
            archive_format: zip
            bundle_platform: windows-x64-gpu
            binary_ext: ".exe"

          # Windows x86_64 — CPU only
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            asset_basename: lmforge-windows-x64-cpu
            archive_format: zip
            bundle_platform: windows-x64-cpu
            binary_ext: ".exe"

          # macOS Apple Silicon — no llama.cpp bundle (uses MLX/omlx instead)
          - os: macos-14
            target: aarch64-apple-darwin
            asset_basename: lmforge-macos-arm64
            archive_format: tar.gz
            bundle_platform: ""        # empty → skip bundle-llamacpp.sh
            binary_ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-core-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-core-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y pkg-config libssl-dev

      - name: Build lmforge
        run: cargo build --release --bin lmforge --target ${{ matrix.target }}

      # ─────────────────────────────────────────────────────────────────────
      #  Stage `lmforge` + (optionally) `llama-server` into dist/<name>/
      # ─────────────────────────────────────────────────────────────────────
      - name: Stage bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          STAGE="dist/${{ matrix.asset_basename }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/lmforge" "$STAGE/lmforge"
          chmod +x "$STAGE/lmforge"

          # macOS skips llama.cpp bundling (omlx is the default engine on Apple Silicon).
          if [ -n "${{ matrix.bundle_platform }}" ]; then
            scripts/bundle-llamacpp.sh --platform "${{ matrix.bundle_platform }}"
            # Copy llama-server + its ~40 sibling shared libs (libllama-server-impl,
            # libggml-*, libllama, libmtmd, libllama-common, etc.) — required since
            # b8800+ split llama-server into a thin wrapper + dlopen'd impl libs.
            cp -P "dist/bundled/llamacpp/${{ matrix.bundle_platform }}"/* "$STAGE/"
            chmod +x "$STAGE/llama-server"
          fi

          echo "--- staged tree ---"
          ls -lah "$STAGE" | head -20
          echo "  ... ($(find "$STAGE" -maxdepth 1 -type f | wc -l) files total)"

      - name: Stage bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          STAGE="dist/${{ matrix.asset_basename }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/lmforge.exe" "$STAGE/lmforge.exe"

          if [ -n "${{ matrix.bundle_platform }}" ]; then
            scripts/bundle-llamacpp.sh --platform "${{ matrix.bundle_platform }}"
            # Copy llama-server.exe + its .dll companions (ggml-*.dll, llama.dll,
            # llama-server-impl.dll, etc.). Same dlopen-split situation as Linux.
            cp -P "dist/bundled/llamacpp/${{ matrix.bundle_platform }}"/* "$STAGE/"
          fi

          echo "--- staged tree ---"
          ls -lah "$STAGE" | head -20
          echo "  ... ($(find "$STAGE" -maxdepth 1 -type f | wc -l) files total)"

      # ─────────────────────────────────────────────────────────────────────
      #  Archive the staged tree.
      # ─────────────────────────────────────────────────────────────────────
      - name: Archive (tar.gz)
        if: matrix.archive_format == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czf "${{ matrix.asset_basename }}.tar.gz" "${{ matrix.asset_basename }}"
          ls -lah "${{ matrix.asset_basename }}.tar.gz"

      - name: Archive (zip)
        if: matrix.archive_format == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist/${{ matrix.asset_basename }}/*" `
            -DestinationPath "dist/${{ matrix.asset_basename }}.zip"
          Get-Item "dist/${{ matrix.asset_basename }}.zip" | Format-List Name,Length

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_basename }}.${{ matrix.archive_format }}
          path: dist/${{ matrix.asset_basename }}.${{ matrix.archive_format }}
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  #  Tauri UI — macOS DMG + Linux AppImage + Windows NSIS .exe (UNCHANGED)
  #
  #  The UI is shipped as a separate, optional install. It does NOT bundle
  #  `lmforge` or `llama-server` — install-ui.sh assumes Core has been
  #  installed first via install-core.sh.
  # ─────────────────────────────────────────────────────────────────────────────
  build-ui:
    name: UI — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
            target: aarch64-apple-darwin

          - os: ubuntu-22.04
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu

          - os: windows-2022
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ui/src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-ui-${{ hashFiles('ui/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-ui-

      - name: Install Linux deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libgtk-3-dev \
            libappindicator3-dev librsvg2-dev \
            patchelf libxdo-dev
          # libwebkit2gtk-4.1-dev was dropped in Ubuntu 26.04 in favour of
          # libwebkitgtk-6.0-dev. Try the 4.1 package first (22.04 / 24.04);
          # fall back to the 6.0 package (26.04+). Tauri 2.x supports both.
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y libwebkitgtk-6.0-dev

      # WebView2 is pre-installed on windows-2022; nothing extra needed.

      - name: Install npm deps
        working-directory: ui
        run: npm ci

      - name: Build Tauri app
        # Must run from ui/ so tauri.conf.json and frontendDist paths resolve correctly.
        # With --target, Tauri places output in the repo-root target/<target>/release/bundle/
        working-directory: ui
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Rename macOS DMG
        if: runner.os == 'macOS'
        run: |
          src=$(find target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$src" "LMForge-UI-${{ matrix.platform }}.dmg"

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: LMForge-UI-${{ matrix.platform }}.dmg
          path: LMForge-UI-${{ matrix.platform }}.dmg
          if-no-files-found: error
          retention-days: 1

      - name: Rename Linux AppImage
        if: runner.os == 'Linux'
        run: |
          src=$(find target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$src" "LMForge-UI-${{ matrix.platform }}.AppImage"

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: LMForge-UI-${{ matrix.platform }}.AppImage
          path: LMForge-UI-${{ matrix.platform }}.AppImage
          if-no-files-found: error
          retention-days: 1

      - name: Rename Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = Get-ChildItem "target/${{ matrix.target }}/release/bundle/nsis/*.exe" | Select-Object -First 1
          Copy-Item $src.FullName "LMForge-UI-${{ matrix.platform }}.exe"

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: LMForge-UI-${{ matrix.platform }}.exe
          path: LMForge-UI-${{ matrix.platform }}.exe
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  #  Publish GitHub Release with all artifacts + install scripts.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-core, build-ui]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lah artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LMForge ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Install

            ### Core (daemon + CLI + bundled llama.cpp)
            ```bash
            curl -fsSL https://github.com/${{ env.REPO }}/releases/latest/download/install-core.sh | bash
            ```

            The installer auto-detects your platform and GPU, pulls the right
            bundle (GPU/CPU × Linux/Windows/macOS), extracts it to
            `~/.local/share/lmforge/bin/`, and symlinks `lmforge` onto your PATH.

            ### UI (desktop app) — install Core first
            ```bash
            curl -fsSL https://github.com/${{ env.REPO }}/releases/latest/download/install-ui.sh | bash
            ```

            ### Uninstall
            ```bash
            # Remove UI only (daemon keeps running)
            curl -fsSL https://github.com/${{ env.REPO }}/releases/latest/download/uninstall-ui.sh | bash

            # Remove Core (stops daemon; keeps models)
            curl -fsSL https://github.com/${{ env.REPO }}/releases/latest/download/uninstall-core.sh | bash

            # Remove everything including models + opt-in engines
            curl -fsSL https://github.com/${{ env.REPO }}/releases/latest/download/uninstall-core.sh | bash -s -- --purge
            ```

            ### Opt-in engines (after install)
            ```bash
            lmforge engine list                  # see what's available + tier
            lmforge engine install vllm          # NVIDIA, opt-in (~5 GB venv)
            lmforge engine install tabbyapi      # NVIDIA, EXL3, opt-in (~3 GB venv)
            ```
          files: |
            artifacts/*
            scripts/install-core.sh
            scripts/uninstall-core.sh
            scripts/install-ui.sh
            scripts/uninstall-ui.sh
