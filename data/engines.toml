# LMForge Default Engine Registry
# All versions pinned to tested releases.
# Users can override in ~/.lmforge/engines.toml
#
# asset_pattern does NOT include the file extension (.tar.gz / .zip).
# The installer resolves the correct extension per OS at runtime.
#
# ──────────────────────────────────────────────────────────────────────────────
#  Tier model — see docs/architecture/ADR-001-engine-tiers.md
# ──────────────────────────────────────────────────────────────────────────────
#    tier = "default"        Bundled with releases. Auto-selected.
#    tier = "opt-in"         Requires `lmforge engine install <id>`. Isolated venv.
#    tier = "experimental"   Kept as cheap insurance. Requires `--engine <id>` and a
#                            user-confirmed warning prompt to use.
#
# Schema-v2 gate fields (used in tandem with `matches_*` v1 fields):
#    min_compute_cap   = "9.0"   Minimum NVIDIA sm_XY (inclusive). Refuses below this.
#    max_compute_cap   = "10.3"  Maximum NVIDIA sm_XY (inclusive). Refuses above this.
#    supported_os_families = ["linux", "windows-wsl2"]
#                                Engine works in these OS families. Empty = use v1 gates only.
#
# These v2 fields are advisory in Phase 0 and become authoritative in Phase 1.5
# (the engine-selector update).
# ──────────────────────────────────────────────────────────────────────────────

[[engine]]
id              = "omlx"
name            = "oMLX"
version         = "0.4.4"
# Version gate. oMLX 0.4.0 moved the VLM loader onto a separate executor thread,
# leaving Qwen3-VL's mRoPE `inv_freq` lazy and pinned to the construction
# thread's GPU stream — every VLM chat completion died with "There is no
# Stream(gpu, 1) in current thread" (jundot/omlx#1685; broken 0.4.0–0.4.3). The
# 0.4.4 mlx-vlm pin bump materializes `inv_freq` and fixes it (verified here:
# Qwen3-VL text + image both 200, zero stream errors). 0.3.6–0.3.8 also worked
# but predate current model support, so the floor is 0.4.4. No upper cap —
# advisory only.
min_version              = "0.4.4"
last_known_good_version  = "0.4.4"
tier            = "default"
matches_os      = "darwin"
matches_arch    = "aarch64"
supported_os_families = ["darwin"]
install_method  = "brew"
brew_tap        = "jundot/omlx"
brew_tap_url    = "https://github.com/jundot/omlx"
brew_formula    = "omlx"
model_format    = "mlx"
hf_org          = "mlx-community"
start_cmd       = "omlx"
start_args      = ["serve", "--port", "{port}", "--model-dir", "{models_dir}"]
health_endpoint = "/v1/models"
supports_embeddings = true
supports_reranking  = true    # Jina Reranker V3 support added in v0.3.6
priority        = 10

[[engine]]
id              = "sglang"
name            = "SGLang"
version         = "0.5.10.post1"
# DEMOTED to experimental (Phase 1, May 2026). Reason: upstream `sgl-kernel`
# wheels ship sm_90 + sm_100 cubins only. Consumer Blackwell (sm_120) GPUs
# import the cu130 wheel but `common_ops.so` is missing for their arch,
# causing chat completions to hang at first token. Tested combinations:
#   sglang 0.5.10.post1 + CUDA 12.8/13.0 + driver 580.95 on RTX 5060 Ti → fail.
#
# As of this commit, SGLang is NEVER auto-selected (tier = "experimental"
# is filtered out of the candidate set unconditionally). To use it, run:
#   lmforge run --engine sglang <model>
# The CLI prints a warning prompt before proceeding.
#
# RE-EVALUATE WHEN: docs.sglang.ai/whl/cu130/ lists sm120 cubins.
# Verify with:      curl -s https://docs.sglang.ai/whl/cu130/ | grep -o sm120
tier            = "experimental"
matches_os      = "linux"
matches_arch    = "x86_64"
matches_gpu     = "nvidia"
supported_os_families = ["linux"]
# Even if someone wires `--engine sglang` we refuse to spawn on sm_120 since
# the import will fail at runtime. Window: Hopper (sm_90) through datacenter
# Blackwell (sm_103) — the cubins `sgl_kernel` actually ships.
min_compute_cap = "9.0"
max_compute_cap = "10.3"
# 8 GB is the practical floor for SGLang on this catalog. The 1.7B / 4B
# AWQ models fit comfortably; 7B/8B AWQ fits with a tighter mem fraction
# (export LMFORGE_SGLANG_MEM_FRACTION=0.3). Below 8 GB SGLang's KV cache
# reservation starves model weights — fall back to llama.cpp there.
min_vram_gb     = 8.0
install_method  = "pip"
pip_package     = "sglang[all]==0.5.10.post1"
# uv supplies/installs Python, so we no longer require system python3 in PATH.
# nvcc + nvidia-smi remain mandatory — SGLang needs the CUDA toolkit at install time.
preflight       = ["nvcc", "nvidia-smi"]
min_disk_gb     = 15
model_format    = "safetensors"
hf_org          = "{original}"
start_cmd       = "python3"
start_args      = ["-m", "sglang.launch_server", "--port", "{port}", "--model-path", "{model_path}"]
health_endpoint = "/health"
supports_embeddings = true    # via --is-embedding flag; LMForge injects automatically
supports_reranking  = false   # Cross-encoder support experimental in v0.5.10; skip
priority        = 20

[[engine]]
id              = "llamacpp"
name            = "llama.cpp"
# Pinned release. Bump together with the release_url + asset_pattern lines
# below AND regenerate data/engines/llamacpp/SHA256SUMS via:
#   scripts/bundle-llamacpp.sh --refresh-sums
version         = "b9351"
tier            = "default"
# macOS intentionally omitted — Apple Silicon uses omlx (MLX) as default.
# Linux GPU variants use upstream's Vulkan build (one binary covers NVIDIA +
# AMD + Intel iGPU). Windows NVIDIA gets the CUDA build for peak perf; Windows
# AMD/Intel fall back to the Vulkan build.
supported_os_families = ["linux", "windows-native", "windows-wsl2"]
matches_fallback = true
install_method  = "binary"
binary          = "llama-server"
release_url     = "https://github.com/ggml-org/llama.cpp/releases/download/b9351"
# {platform} is resolved by the installer; extension (.tar.gz or .zip) is appended by OS
asset_pattern   = "llama-b9351-bin-{platform}"
# Windows + NVIDIA only: companion zip with the CUDA runtime DLLs. The
# installer picks {cuda_variant} = 12.4 or 13.1 based on the driver's
# reported CUDA runtime version via nvidia-smi.
cudart_pattern  = "cudart-llama-bin-win-cuda-{cuda_variant}-x64"
model_format    = "gguf"
hf_org          = "bartowski"
start_cmd       = "llama-server"
start_args      = ["--port", "{port}", "--model", "{model_path}", "-ngl", "{gpu_layers}"]
health_endpoint = "/health"
supports_embeddings = true    # via --embeddings flag; LMForge injects automatically
supports_reranking  = true    # via --reranking flag; stable from b4355+
priority        = 100

# ──────────────────────────────────────────────────────────────────────────────
# Opt-in tier: vLLM (Phase 3)
# ──────────────────────────────────────────────────────────────────────────────
# Why opt-in instead of default:
#   * 5+ GB on disk after install (torch, triton, flashinfer, cubins)
#   * Cold-start adds ~30s of CUDA-graph capture on first request
#   * llama.cpp + flash attention reaches ~85% of vLLM single-stream tput on
#     consumer cards. The win is concurrency (batch>=4), which most desktop
#     users don't hit. Opt-in keeps the default install lean.
#
# Why not Windows-native: vLLM relies on `triton` + UNIX-only ipc primitives
# in its scheduler. The vLLM team explicitly excludes native Windows in their
# install docs; WSL2 is the supported path on Windows boxes.
#
# Compute-cap window: sm_75 (Turing) through sm_120 (consumer Blackwell).
#   * vLLM 0.20+ default wheel is cu130 / torch 2.11, with sm_120 in the
#     default arch list — see vllm-project/vllm#39878. No manual cu13X
#     juggling needed for Blackwell.
#   * Older arches (Ampere/Ada/Hopper) on CUDA 12.8/12.9 use the `cu129`
#     variant wheel; the torch-backend resolver picks it automatically.
#
# NVFP4 MoE on sm_120 still hits an attention-path bug under batch>1 as of
# the upstream tracker (open issue). Soft warning emitted by the adapter at
# start time — see M3.4 / `cli::engine::print_soft_caveats`.
[[engine]]
id              = "vllm"
name            = "vLLM"
# Pinned to the latest stable. CUDA 13.0 became the default in 0.20.0 and
# sm_120 lives in its default `TORCH_CUDA_ARCH_LIST` — no override needed
# for Blackwell. RE-EVALUATE WHEN: vLLM ships the NVFP4 MoE fix on sm_120.
version         = "0.21.0"
tier            = "opt-in"
supported_os_families = ["linux", "windows-wsl2"]
matches_gpu     = "nvidia"
# Turing (sm_75) is the practical floor — older arches lack FA2 kernels that
# vLLM hard-requires. Upper bound left unset; resolver picks the wheel.
min_compute_cap = "7.5"
# vLLM's KV-cache reservation + PagedAttention block table needs headroom.
# Below ~10 GB you'll bounce off OOM on anything beyond 7B-4bit. Set at 12
# so the soft floor matches what users actually report success on.
min_vram_gb     = 12.0
install_method  = "pip"
pip_package     = "vllm==0.21.0"
# FlashInfer JIT-compiles a sampling kernel on first model load (its
# prebuilt cubins don't cover every quant + arch combo). The build uses
# ninja, which isn't a runtime dep of vLLM's wheel — install it here so
# the very first chat request doesn't crash with FileNotFoundError.
pip_extras      = ["ninja"]
# vLLM needs the CUDA toolkit at install time (compiles its own cubins for
# attention layouts not in the prebuilt wheel). Same gate as SGLang.
preflight       = ["nvcc", "nvidia-smi"]
min_disk_gb     = 12
model_format    = "safetensors"
hf_org          = "{original}"
# vLLM ships its own CLI wrapper; use the venv's `vllm` binary directly so we
# don't have to know its full python -m path.
start_cmd       = "vllm"
start_args      = [
    "serve",
    "{model_path}",
    "--port", "{port}",
    "--host", "127.0.0.1",
    "--enable-prefix-caching",
    # Single-GPU only by default — multi-GPU TP needs `--tensor-parallel-size N`
    # which the adapter wires conditionally from HardwareProfile.gpu_count.
]
health_endpoint = "/health"
# Embeddings stay on the llama.cpp sidecar — vLLM's embedding pooling layer
# is per-model and our catalog isn't tagged for it. See ADR-001 §"Sidecar".
supports_embeddings = false
supports_reranking  = false
priority        = 25

# ──────────────────────────────────────────────────────────────────────────────
# Opt-in tier: TabbyAPI + ExLlamaV3 (Phase 4)
# ──────────────────────────────────────────────────────────────────────────────
# Why opt-in:
#   * Best speed-per-VRAM on consumer NVIDIA; EXL3 quant beats AWQ/GPTQ at
#     identical bits. Niche-but-strong user base (turboderp ecosystem).
#   * Install is more involved: TabbyAPI is a "clone-and-run" application
#     (its pyproject sets `py-modules = []`), not a real pip package, so the
#     installer clones the source tree AND creates a venv with the cu13 extra.
#   * Cu13 extra requires Python 3.12+ — uv auto-installs the interpreter.
#
# Why not Windows-native: ExLlamaV3 cu13 wheels are built for win_amd64 and
# Linux x86_64 only; both work. WSL2 falls under "linux" here.
#
# Compute-cap window: sm_75 → sm_120. ExLlamaV3 v0.0.37 ships cu132 wheels
# (built against torch 2.11.0+cu130) that include sm_120 cubins — Blackwell
# works out of the box, no JIT compile.
#
# Embeddings/reranking: NOT supported by this adapter. Embeddings stay on
# the llama.cpp sidecar (same policy as vLLM / SGLang).
[[engine]]
id              = "tabbyapi"
name            = "TabbyAPI (ExLlamaV3)"
# Tracks exllamav3's pinned version since that's the actual inference lib;
# TabbyAPI itself is rolling-release (no semver) and pinned by git revision.
# RE-EVALUATE WHEN: turboderp ships an exllamav3 release with sm_103
# (datacenter Blackwell) cubins, or TabbyAPI cuts a tagged release.
version         = "0.0.37"
tier            = "opt-in"
supported_os_families = ["linux", "windows-wsl2"]
matches_gpu     = "nvidia"
min_compute_cap = "7.5"
# EXL3 quant is the most VRAM-efficient of the four formats we support
# (~30% smaller than AWQ at matched perplexity per turboderp's benchmarks).
# 6 GB floor lets a 4-bit 7B fit on the smallest Ampere consumer cards.
min_vram_gb     = 6.0

install_method  = "pip"
# `cu13` extra pulls torch 2.11.0+cu130, exllamav3 0.0.37+cu132.torch2.11.0,
# triton, flash-attn 2.8.3+cu130torch2.11 — the full Blackwell-ready stack.
# Pinned by branch; bump source_revision to a SHA in production releases
# for reproducibility.
pip_package        = "tabbyAPI[cu13] @ git+https://github.com/theroyallab/tabbyAPI.git"
source_repo        = "https://github.com/theroyallab/tabbyAPI.git"
source_revision    = "main"
min_python_version = "3.12"
# TabbyAPI's `py-modules = []` means `import tabbyAPI` fails post-install.
# Probe `exllamav3` instead — that's the package whose presence actually
# proves the install worked.
verify_import_name = "exllamav3"

# CUDA toolkit isn't required at install time (everything is wheels). But
# `nvidia-smi` is needed at runtime so we still preflight it.
preflight       = ["nvidia-smi"]
min_disk_gb     = 8
model_format    = "exl3"
hf_org          = "{original}"
# Adapter spawns `<venv>/bin/python <source_dir>/main.py` — start_cmd /
# start_args are unused for this engine; the adapter knows the layout.
start_cmd       = "python"
start_args      = []
health_endpoint = "/health"
supports_embeddings = false
supports_reranking  = false
priority        = 30
