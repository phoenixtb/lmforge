# LMForge Default Engine Registry
# All versions pinned to tested releases.
# Users can override in ~/.lmforge/engines.toml

[[engine]]
id              = "omlx"
name            = "oMLX"
version         = "0.3.0"
matches_os      = "darwin"
matches_arch    = "aarch64"
install_method  = "brew"
brew_tap        = "jundot/omlx"
brew_formula    = "omlx"
pip_fallback    = "omlx==0.3.0"
model_format    = "mlx"
hf_org          = "mlx-community"
start_cmd       = "omlx"
start_args      = ["serve", "--port", "{port}", "--model-dir", "{data_dir}/models"]
health_endpoint = "/v1/models"
supports_embeddings = true
supports_reranking  = false   # Not in oMLX v0.3.0; enable when version supports it
priority        = 10

[[engine]]
id              = "sglang"
name            = "SGLang"
version         = "0.5.9"
matches_os      = "linux"
matches_arch    = "x86_64"
matches_gpu     = "nvidia"
min_vram_gb     = 24.0
install_method  = "pip"
pip_package     = "sglang[all]==0.5.9"
preflight       = ["nvcc", "nvidia-smi", "python3"]
min_disk_gb     = 15
model_format    = "safetensors"
hf_org          = "{original}"
start_cmd       = "python3"
start_args      = ["-m", "sglang.launch_server", "--port", "{port}", "--model-path", "{model_path}"]
health_endpoint = "/health"
supports_embeddings = true    # via --is-embedding flag; LMForge injects automatically
supports_reranking  = false   # Cross-encoder support experimental in v0.5.9; skip
priority        = 20

[[engine]]
id              = "llamacpp"
name            = "llama.cpp"
version         = "b8558"
matches_fallback = true
install_method  = "binary"
binary          = "llama-server"
release_url     = "https://github.com/ggml-org/llama.cpp/releases/download/b8558"
asset_pattern   = "llama-b8558-bin-{platform}.tar.gz"
model_format    = "gguf"
hf_org          = "bartowski"
start_cmd       = "llama-server"
start_args      = ["--port", "{port}", "--model", "{model_path}", "-ngl", "{gpu_layers}"]
health_endpoint = "/health"
supports_embeddings = true    # via --embeddings flag; LMForge injects automatically
supports_reranking  = true    # via --reranking flag; stable from b4355+
priority        = 100
