ShortDescription: Hardware-aware LLM inference orchestrator - from edge to server
Description: |-
  LMForge probes your hardware (GPU vendor, VRAM, RAM), selects and installs
  the best local inference engine, and serves OpenAI- and Ollama-compatible
  APIs for local LLMs. Includes model management, an interactive REPL, and
  multi-model orchestration.
  After installing, run "lmforge init" once to detect hardware and install
  the inference engine, then "lmforge start".
